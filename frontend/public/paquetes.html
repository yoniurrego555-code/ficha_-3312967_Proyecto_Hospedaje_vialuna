<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paquetes | Via Luna</title>
    <link rel="stylesheet" href="../css/admin-theme.css">
</head>
<body>
    <main class="content">
        <section class="hero">
            <div>
                <h2>Modulo de paquetes</h2>
                <p>Crea, consulta, edita y elimina paquetes del hospedaje. Tambien puedes cambiar su estado para controlar disponibilidad comercial.</p>
            </div>
            <div class="badge">CRUD conectado</div>
        </section>

        <section class="grid">
            <article class="panel">
                <div class="panel-header">
                    <h3>Formulario</h3>
                    <p id="formTitle">Registra un nuevo paquete</p>
                </div>

                <div id="mensaje" class="message"></div>

                <form id="paqueteForm">
                    <input type="hidden" id="paqueteId">

                    <div class="field">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Ej. Escapada romantica" required>
                    </div>

                    <div class="field">
                        <label for="descripcion">Descripcion</label>
                        <textarea id="descripcion" name="descripcion" placeholder="Describe que incluye el paquete."></textarea>
                    </div>

                    <div class="field-grid">
                        <div class="field">
                            <label for="precio">Precio</label>
                            <input type="number" id="precio" name="precio" min="0" step="0.01" placeholder="1800" required>
                        </div>
                        <div class="field">
                            <label for="estado">Estado</label>
                            <select id="estado" name="estado" required>
                                <option value="disponible">Disponible</option>
                                <option value="agotado">Agotado</option>
                                <option value="inactivo">Inactivo</option>
                            </select>
                        </div>
                    </div>

                    <div class="actions">
                        <button class="primary" type="submit" id="submitButton">Guardar paquete</button>
                        <button class="secondary" type="button" id="btnCancelarEdicion">Cancelar</button>
                    </div>
                </form>
            </article>

            <article class="panel">
                <div class="toolbar">
                    <input class="search" type="search" id="buscador" placeholder="Buscar por nombre, descripcion o estado">
                    <button class="secondary" type="button" id="btnListar">Listar paquetes</button>
                </div>

                <div id="contenedor" class="cards">
                    <div class="empty">Cargando paquetes...</div>
                </div>
            </article>
        </section>
    </main>

    <script type="module" src="../js/paquetes.js"></script>
</body>
</html>
