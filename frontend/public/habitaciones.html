<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitaciones | Via Luna</title>
    <link rel="stylesheet" href="../css/admin-theme.css">
</head>
<body>
    <main class="content">
        <section class="hero">
            <div>
                <h2>Modulo de habitaciones</h2>
                <p>Crea, consulta, edita y elimina</p>
            </div>
            <div class="badge">CRUD conectado</div>
        </section>

        <section class="grid">
            <article class="panel">
                <div class="panel-header">
                    <h3>Formulario</h3>
                    <p id="formTitle">Registra una nueva habitacion</p>
                </div>

                <div id="mensaje" class="message"></div>

                <form id="habitacionForm">
                    <input type="hidden" id="habitacionId">

                    <div class="field">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Ej. Suite Luna 101" required>
                    </div>

                    <div class="field">
                        <label for="descripcion">Descripcion</label>
                        <textarea id="descripcion" name="descripcion" placeholder="Describe amenidades, vista, cama, etc."></textarea>
                    </div>

                    <div class="field-grid">
                        <div class="field">
                            <label for="precio">Precio por noche</label>
                            <input type="number" id="precio" name="precio" min="1" step="0.01" placeholder="1200" required>
                        </div>
                        <div class="field">
                            <label for="capacidad">Capacidad</label>
                            <input type="number" id="capacidad" name="capacidad" min="1" step="1" placeholder="2" required>
                        </div>
                    </div>

                    <div class="field">
                        <label for="estado">Estado</label>
                        <select id="estado" name="estado" required>
                            <option value="disponible">Disponible</option>
                            <option value="reservada">Reservada</option>
                            <option value="ocupada">Ocupada</option>
                            <option value="mantenimiento">Mantenimiento</option>
                        </select>
                    </div>

                    <div class="actions">
                        <button class="primary" type="submit" id="submitButton">Guardar habitacion</button>
                        <button class="secondary" type="button" id="btnCancelarEdicion">Cancelar</button>
                    </div>
                </form>
            </article>

            <article class="panel">
                <div class="toolbar">
                    <input class="search" type="search" id="buscador" placeholder="Buscar por nombre, descripcion o estado">
                    <button class="secondary" type="button" id="btnListar">Listar habitaciones</button>
                </div>

                <div id="habitacionesContainer" class="cards">
                    <div class="empty">Cargando habitaciones...</div>
                </div>
            </article>
        </section>
    </main>

    <script type="module" src="../js/habitaciones.js"></script>
</body>
</html>
