<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña | ViaLuna</title>
  <link rel="stylesheet" href="../styles/login.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-panel">
      <div class="auth-brand">
        <span class="auth-chip">Recuperación</span>
        <h1>Nueva contraseña</h1>
        <p>Escribe el correo de tu cuenta y define una nueva contraseña.</p>
      </div>

      <form id="recoverPasswordForm" class="auth-form">
        <div class="auth-field">
          <label for="recoverEmail">Correo electrónico</label>
          <div class="auth-input">
            <span class="auth-icon">@</span>
            <input type="email" id="recoverEmail" autocomplete="email" required>
          </div>
        </div>

        <div class="auth-field">
          <label for="recoverPassword">Nueva contraseña</label>
          <div class="auth-input">
            <span class="auth-icon">*</span>
            <input type="password" id="recoverPassword" minlength="6" autocomplete="new-password" required>
            <button type="button" id="toggleRecoverPassword">Mostrar</button>
          </div>
        </div>

        <div class="auth-field">
          <label for="recoverConfirmPassword">Confirmar contraseña</label>
          <div class="auth-input">
            <span class="auth-icon">*</span>
            <input type="password" id="recoverConfirmPassword" minlength="6" autocomplete="new-password" required>
            <button type="button" id="toggleRecoverConfirmPassword">Mostrar</button>
          </div>
        </div>

        <p id="recoverFeedback" class="feedback" aria-live="polite"></p>

        <div class="auth-actions">
          <button type="submit" class="btn btn-primary">Actualizar contraseña</button>
          <a class="btn btn-secondary" href="./login.html">Volver al login</a>
        </div>
      </form>
    </section>
  </main>

  <script type="module" src="../dashboard/core/auth.js"></script>
</body>
</html>
