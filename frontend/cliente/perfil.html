<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil | Via Luna</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body class="resort-dashboard">
  <main class="resort-shell">
    <nav class="resort-navbar resort-navbar-solid" aria-label="Navegacion cliente">
      <a class="resort-brand" href="dashboard.html" aria-label="Via Luna">
        <strong>Via Luna</strong>
        <span>Hospedaje</span>
      </a>

      <div class="resort-links">
        <a href="dashboard.html">Inicio</a>
        <a href="reservas.html">Mis reservas</a>
        
        <a class="active" href="perfil.html">Mi perfil</a>
      </div>

      <div class="resort-user">
        <span class="user-avatar" id="userInitial">V</span>
        <span><strong id="userNameDisplay">Cliente</strong></span>
        <button id="logoutBtn" type="button" aria-label="Cerrar sesión">Cerrar sesión</button>
      </div>
    </nav>

    <section class="premium-page">
      <header class="premium-page-head">
        <p class="section-kicker">Cuenta</p>
        <h1>Mi perfil</h1>
        <p>Tu información personal para una estancia tranquila en Via Luna.</p>
      </header>

      <section class="premium-profile-grid">
        <article class="premium-panel profile-panel">
          <div class="premium-panel-head">
            <h2>Información personal</h2>
            <button type="button" class="package-btn" id="editProfileBtn">Editar perfil</button>
          </div>

          <form id="perfilForm" class="premium-form readonly-profile">
            <label class="premium-field">
              <span>Nombre completo</span>
              <input type="text" id="nombreCompleto" name="nombre_completo" readonly>
            </label>
            <label class="premium-field">
              <span>Documento</span>
              <input type="text" id="documento" readonly>
            </label>
            <label class="premium-field">
              <span>Correo electrónico</span>
              <input type="email" id="email" name="email" readonly>
            </label>

            <!-- País con selector y código de llamada -->
            <label class="premium-field">
              <span>País</span>
              <select id="paisCode" name="pais_code" disabled style="height:52px; border-radius:14px; border:1px solid rgba(18,54,44,.14); padding:0 16px; font-size:15px; font-weight:600; background:#fafcfb; color:#173029;">
                <!-- opciones inyectadas por perfilCliente.js -->
              </select>
            </label>

            <!-- Departamento y Dirección -->
            <label class="premium-field">
              <span>Departamento</span>
              <input type="text" id="departamento" name="departamento" readonly>
            </label>
            <label class="premium-field">
              <span>Dirección</span>
              <input type="text" id="direccion" name="direccion" readonly>
            </label>

            <!-- Teléfono con prefijo de país -->
            <label class="premium-field">
              <span>Teléfono</span>
              <div style="display:flex; align-items:center; gap:8px;">
                <span id="dialCodeDisplay" style="display:inline-flex; align-items:center; min-height:52px; padding:0 12px; border-radius:14px; border:1px solid rgba(18,54,44,.14); background:#f0f4f2; font-size:14px; font-weight:700; color:#173029; white-space:nowrap;"></span>
                <input type="text" id="telefono" name="telefono" readonly style="flex:1;">
              </div>
              <small style="font-size:11px; color:#7a9088; margin-top:4px;">El código de país es solo referencial.</small>
            </label>

            <label class="premium-field">
              <span>Fecha de nacimiento</span>
              <input type="date" id="fechaNacimiento" name="fecha_nacimiento" readonly>
            </label>
            <input type="hidden" id="tipo_documento" name="tipo_documento" value="CC">
            <div class="premium-actions profile-save-actions">
              <button type="button" class="btn-glass light" id="cancelEditBtn">Cancelar</button>
              <button type="submit" class="package-btn">Guardar cambios</button>
            </div>
          </form>
        </article>

        <article class="premium-panel profile-panel">
          <div class="premium-panel-head">
            <h2>Cambiar contraseña</h2>
          </div>

          <form id="passwordForm" class="premium-form">
            <label class="premium-field">
              <span>Contraseña actual</span>
              <input type="password" name="current_password" required>
            </label>
            <label class="premium-field">
              <span>Nueva contraseña</span>
              <input type="password" name="new_password" required minlength="6">
            </label>
            <label class="premium-field">
              <span>Confirmar contraseña</span>
              <input type="password" name="confirm_password" required minlength="6">
            </label>
            <div class="premium-actions">
              <button type="submit" class="package-btn">Cambiar contraseña</button>
            </div>
          </form>
        </article>
      </section>
    </section>
  </main>

  <script type="module" src="js/perfilCliente.js"></script>
</body>
</html>
