<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cliente | Via Luna</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="css/sidebar-cliente.css">
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <!-- Tailwind CSS para reutilizar vistas del admin -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      corePlugins: {
        preflight: false,
      },
      theme: {
        extend: {
          colors: {
            brand: '#258a60',
            'brand-deep': '#173029',
            muted: '#6b7280'
          }
        }
      }
    }
  </script>
</head>
<body class="resort-dashboard">
  <div class="cliente-layout">
    
    <!-- Topbar Mobile -->
    <header class="cliente-topbar">
      <a class="resort-brand cliente-sidebar-brand" href="#inicio">
        <strong>Via Luna</strong>
        <span>Hospedaje</span>
      </a>
      <button class="sidebar-toggle-mobile" id="sidebarToggle" aria-label="Abrir menú">
        <i class="fa-solid fa-bars"></i>
      </button>
    </header>

    <!-- Sidebar Overlay Mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="cliente-sidebar" id="sidebar">
      <div class="cliente-sidebar-header">
        <a class="cliente-sidebar-brand" href="#inicio">
          <strong>Via Luna</strong>
          <span>Hospedaje</span>
        </a>
      </div>

      <nav class="cliente-nav" aria-label="Navegación cliente">
        <a class="cliente-nav-link active" href="#inicio" data-view="inicio">
          <i class="fa-solid fa-house cliente-nav-icon"></i> Inicio
        </a>
        <a class="cliente-nav-link" href="#habitaciones" data-view="habitaciones">
          <i class="fa-solid fa-bed cliente-nav-icon"></i> Habitaciones
        </a>
        <a class="cliente-nav-link" href="#paquetes" data-view="paquetes">
          <i class="fa-solid fa-box-open cliente-nav-icon"></i> Paquetes
        </a>
        <a class="cliente-nav-link" href="#servicios" data-view="servicios">
          <i class="fa-solid fa-concierge-bell cliente-nav-icon"></i> Servicios
        </a>
        <a class="cliente-nav-link" href="#reservas" data-view="reservas">
          <i class="fa-solid fa-calendar-check cliente-nav-icon"></i> Mis reservas
        </a>
        <a class="cliente-nav-link" href="#perfil" data-view="perfil">
          <i class="fa-solid fa-user cliente-nav-icon"></i> Mi perfil
        </a>
      </nav>

      <div class="cliente-sidebar-footer">
        <div class="cliente-user-card">
          <div class="cliente-user-avatar" id="userInitial">V</div>
          <div class="cliente-user-info">
            <strong id="userNameDisplay">Cliente</strong>
            <small>Huésped Via Luna</small>
          </div>
        </div>
        <button class="btn-logout" id="logoutBtn" type="button">
          <i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="cliente-content resort-shell">
      <div id="contenido">
        <!-- Vistas dinámicas se cargan aquí -->
      </div>
    </main>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
