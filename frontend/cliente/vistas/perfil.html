<section class="premium-page">
  <header class="premium-page-head">
    <p class="section-kicker">Cuenta</p>
    <h1>Mi perfil</h1>
    <p>Tu información personal para una estancia tranquila en Via Luna.</p>
  </header>

  <section class="premium-profile-grid">
    <article class="premium-panel profile-panel">
      <div class="premium-panel-head">
        <h2>Información personal</h2>
        <button type="button" class="package-btn" id="editProfileBtn">Editar perfil</button>
      </div>

      <form id="perfilForm" class="premium-form readonly-profile">
        <div class="reg-row" style="display:flex; gap:15px; margin-bottom:15px;">
          <label class="premium-field" style="flex:1;">
            <span>Nombre</span>
            <input type="text" id="nombre" name="nombre" readonly>
          </label>
          <label class="premium-field" style="flex:1;">
            <span>Apellido</span>
            <input type="text" id="apellido" name="apellido" readonly>
          </label>
        </div>
        <div class="reg-row" style="display:flex; gap:15px; margin-bottom:15px;">
          <label class="premium-field" style="flex:1;">
            <span>Tipo Documento</span>
            <select id="tipo_documento" name="tipo_documento" disabled style="width:100%; padding:10px; border-radius:8px; border:1px solid #d1d5db; background:#f9fafb; color:#1f2937;">
                <option value="CC">Cédula de Ciudadanía</option>
                <option value="TI">Tarjeta de Identidad</option>
                <option value="CE">Cédula de Extranjería</option>
                <option value="Pasaporte">Pasaporte</option>
            </select>
          </label>
          <label class="premium-field" style="flex:1;">
            <span>N° Documento</span>
            <input type="text" id="documento" readonly>
          </label>
        </div>
        <div class="reg-row" style="display:flex; gap:15px; margin-bottom:15px;">
          <label class="premium-field" style="flex:1;">
            <span>País</span>
            <select id="paisCode" name="Pais" disabled style="width:100%; padding:10px; border-radius:8px; border:1px solid #d1d5db; background:#f9fafb; color:#1f2937;">
                <!-- opciones inyectadas por JS -->
            </select>
          </label>
          <label class="premium-field" style="flex:1;">
            <span>Teléfono</span>
            <div style="display:flex; align-items:stretch; gap:8px;">
                <span id="dialCodeDisplay" style="background:#f3f4f6; border:1px solid #d1d5db; border-radius:8px; padding:10px; font-size:0.9rem; color:#4b5563; display:flex; align-items:center; justify-content:center; min-width:45px;"></span>
                <input type="text" id="telefono" name="telefono" readonly style="flex:1;">
            </div>
          </label>
        </div>
        <div class="reg-row" style="display:flex; gap:15px; margin-bottom:15px;">
          <label class="premium-field" style="flex:1;">
            <span>Departamento</span>
            <input type="text" id="departamento" name="departamento" readonly>
          </label>
          <label class="premium-field" style="flex:1;">
            <span>Dirección</span>
            <input type="text" id="direccion" name="direccion" readonly>
          </label>
        </div>
        <div class="reg-row" style="display:flex; gap:15px; margin-bottom:15px;">
          <label class="premium-field" style="flex:1;">
            <span>Correo Electrónico</span>
            <input type="email" id="email" name="email" readonly>
          </label>
          <label class="premium-field" style="flex:1;">
            <span>Fecha de nacimiento</span>
            <input type="date" id="fechaNacimiento" name="fecha_nacimiento" readonly>
          </label>
        </div>
        <div class="premium-actions profile-save-actions">
          <button type="button" class="btn-glass light" id="cancelEditBtn">Cancelar</button>
          <button type="submit" class="package-btn">Guardar cambios</button>
        </div>
      </form>
    </article>

    <article class="premium-panel profile-panel">
      <div class="premium-panel-head">
        <h2>Cambiar contraseña</h2>
      </div>

      <form id="passwordForm" class="premium-form">
        <label class="premium-field">
          <span>Contraseña actual</span>
          <input type="password" name="current_password" required>
        </label>
        <label class="premium-field">
          <span>Nueva contraseña</span>
          <input type="password" name="new_password" required minlength="6">
        </label>
        <label class="premium-field">
          <span>Confirmar contraseña</span>
          <input type="password" name="confirm_password" required minlength="6">
        </label>
        <div class="premium-actions">
          <button type="submit" class="package-btn">Cambiar contraseña</button>
        </div>
      </form>
    </article>
  </section>
</section>
