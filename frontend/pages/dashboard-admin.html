<!DOCTYPE html>
<html lang="es" data-auth-pending>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Dashboard Admin | ViaLuna</title>
  <link rel="stylesheet" href="../css/admin-theme.css">
  <script type="module">
    import { protectPage } from "../dashboard/core/authGuard.js";
    protectPage({ requiredRole: "admin" });
  </script>
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <h1>🏨 VIA LUNA</h1>
        <p class="sidebar-description">Gestiona reservas, habitaciones, paquetes y servicios con una navegación clara y cómoda.</p>
      </div>

      <nav class="admin-nav" aria-label="Panel administrativo">
        <a class="admin-link active" href="#dashboard" data-view="dashboard">• Dashboard</a>
        <a class="admin-link" href="#clientes" data-view="clientes">• Clientes</a>
        <a class="admin-link" href="#reservas" data-view="reservas">• Reservas</a>
        <a class="admin-link" href="#pagos" data-view="pagos">• Pagos</a>
        <a class="admin-link" href="#habitaciones" data-view="habitaciones">• Habitaciones</a>
        <a class="admin-link" href="#servicios" data-view="servicios">• Servicios</a>
        <a class="admin-link" href="#paquetes" data-view="paquetes">• Paquetes</a>
        <a class="admin-link" href="#roles-permisos" data-view="roles-permisos">• Roles</a>
      </nav>

      <div class="sidebar-footer">
        <button class="logout-btn" id="logoutBtn">
          🚪 Cerrar sesión
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="content">
      <div id="contenido">
        <!-- Content will be loaded dynamically here -->
      </div>
    </main>
  </div>

  <script type="module" src="../js/dashboard-admin.js"></script>
</body>
</html>
