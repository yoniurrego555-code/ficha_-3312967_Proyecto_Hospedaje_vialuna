<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Via Luna | Crear Contraseña</title>
    <link rel="stylesheet" href="../css/login.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .reset-password-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f4fdf8;
            padding: 20px;
        }
        .reset-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 450px;
            padding: 40px 30px;
            text-align: center;
            border-top: 4px solid #258a60;
        }
        .reset-brand {
            margin-bottom: 30px;
        }
        .reset-brand h1 {
            color: #173029;
            margin: 0;
            font-size: 24px;
        }
        .reset-brand p {
            color: #666;
            margin-top: 5px;
            font-size: 14px;
        }
        .reset-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
        }
        .reset-form label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            display: block;
        }
        .reset-form input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        .reset-form input:focus {
            outline: none;
            border-color: #258a60;
            box-shadow: 0 0 0 3px rgba(37,138,96,0.1);
        }
        .reset-submit {
            background-color: #258a60;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        .reset-submit:hover {
            background-color: #1e704e;
        }
        .reset-submit:disabled {
            background-color: #999;
            cursor: not-allowed;
        }
        .error-msg {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="reset-password-container">
        <div class="reset-card">
            <div class="reset-brand">
                <h1>Vía Luna Hospedaje</h1>
                <p>Crea la contraseña de tu nueva cuenta</p>
            </div>
            
            <form id="resetForm" class="reset-form" novalidate>
                <div>
                    <label for="newPassword">Crea una contraseña segura</label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>
                
                <div>
                    <label for="confirmPassword">Confirmar contraseña</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Vuelve a escribir la contraseña" required>
                    <div id="errorText" class="error-msg">Las contraseñas no coinciden.</div>
                </div>

                <button type="submit" id="submitBtn" class="reset-submit">Guardar y acceder</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { restablecerContrasena } from '../js/usuarios.js';

        const form = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorText = document.getElementById('errorText');
        
        // Obtener token de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            Swal.fire({
                icon: 'error',
                title: 'Enlace inválido',
                text: 'No se encontró un token de seguridad. Por favor solicita un nuevo enlace de recuperación.',
                confirmButtonText: 'Ir al inicio',
                allowOutsideClick: false
            }).then(() => {
                window.location.replace('login.html');
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorText.style.display = 'none';

            const newPassword = form.newPassword.value;
            const confirmPassword = form.confirmPassword.value;

            if (newPassword.length < 6) {
                errorText.textContent = 'La contraseña debe tener al menos 6 caracteres.';
                errorText.style.display = 'block';
                return;
            }

            if (newPassword !== confirmPassword) {
                errorText.textContent = 'Las contraseñas no coinciden.';
                errorText.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Guardando...';

            try {
                const response = await restablecerContrasena({ token, newPassword });
                
                await Swal.fire({
                    icon: 'success',
                    title: '¡Contraseña configurada!',
                    text: response.message || 'Tu contraseña ha sido creada con éxito. Ya puedes iniciar sesión en el sistema.',
                    confirmButtonText: 'Iniciar sesión',
                    allowOutsideClick: false
                });
                
                window.location.replace('login.html');
            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'Enlace expirado o inválido',
                    text: error.message || 'El enlace ha expirado o no es válido. Por favor solicita uno nuevo.',
                    confirmButtonText: 'Entendido'
                });
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Guardar y acceder';
            }
        });
    </script>
</body>
</html>
