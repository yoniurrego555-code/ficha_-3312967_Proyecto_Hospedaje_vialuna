<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paquetes | Via Luna</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <main class="content">
        <!-- Header Section -->
        <section class="module-header-container" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <div>
                <h1 style="font-size: 2rem; color: var(--brand-deep); margin: 0;">Paquetes</h1>
                <p style="color: var(--muted); margin: 5px 0 0 0;">Gestiona los paquetes turÃ­sticos y promocionales.</p>
            </div>
            <button class="primary" id="btnNuevoPaquete" style="display: flex; align-items: center; gap: 8px; padding: 12px 24px; border-radius: 12px; font-weight: 600;">
                <span style="font-size: 1.2rem;">+</span> Nuevo paquete
            </button>
        </section>

        <!-- Metrics Grid -->
        <section class="metrics-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;">
            <div class="metric-card modern-card" style="padding: 20px; background: white; border-radius: 16px; display: flex; align-items: center; gap: 15px;">
                <div style="width: 50px; height: 50px; background: rgba(0,0,0,0.05); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">ðŸŽ</div>
                <div>
                    <p style="margin: 0; font-size: 0.85rem; color: var(--muted);">Total paquetes</p>
                    <h3 id="metricTotal" style="margin: 0; font-size: 1.5rem; color: var(--brand-deep);">0</h3>
                </div>
            </div>
            <div class="metric-card modern-card" style="padding: 20px; background: #f0fdf4; border-radius: 16px; display: flex; align-items: center; gap: 15px; border-left: 4px solid var(--ok);">
                <div style="width: 50px; height: 50px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">âœ“</div>
                <div>
                    <p style="margin: 0; font-size: 0.85rem; color: var(--muted);">Disponibles</p>
                    <h3 id="metricDisponibles" style="margin: 0; font-size: 1.5rem; color: var(--ok);">0</h3>
                </div>
            </div>
            <div class="metric-card modern-card" style="padding: 20px; background: #fef2f2; border-radius: 16px; display: flex; align-items: center; gap: 15px; border-left: 4px solid #ef4444;">
                <div style="width: 50px; height: 50px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">âœ•</div>
                <div>
                    <p style="margin: 0; font-size: 0.85rem; color: var(--muted);">Agotados</p>
                    <h3 id="metricAgotados" style="margin: 0; font-size: 1.5rem; color: #ef4444;">0</h3>
                </div>
            </div>
        </section>

        <!-- Filters Bar -->
        <section class="filters-bar modern-card" style="background: white; padding: 20px; border-radius: 16px; margin-bottom: 30px; display: grid; grid-template-columns: 2fr 1fr auto; gap: 15px; align-items: end;">
            <div class="field">
                <label style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: block;">Buscar paquete...</label>
                <input type="text" id="buscador" placeholder="Nombre o descripciÃ³n..." style="padding: 10px 15px; border-radius: 10px; border: 1px solid var(--line); width: 100%;">
            </div>
            <div class="field">
                <label style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: block;">Estado</label>
                <select id="filtroEstado" style="padding: 10px 15px; border-radius: 10px; border: 1px solid var(--line); width: 100%;">
                    <option value="todos">Todos</option>
                    <option value="1">Disponible</option>
                    <option value="0">Agotado</option>
                </select>
            </div>
            <button class="secondary" id="btnLimpiarFiltros" style="padding: 10px 20px; border-radius: 10px; font-weight: 600; white-space: nowrap;">
                ðŸ”„ Limpiar
            </button>
        </section>

        <!-- Packages Grid -->
        <section id="contenedor" class="cards" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px;">
            <div class="empty">Cargando paquetes...</div>
        </section>

        <!-- Form Modal -->
        <div id="paqueteModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
            <article class="panel modal-content" style="background: white; border-radius: 20px; padding: 30px; width: 500px; max-width: 95%; box-shadow: 0 20px 40px rgba(0,0,0,0.2);">
                <div class="panel-header" style="margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px;">
                    <h3 id="formTitle" style="margin: 0; color: var(--brand-deep);">Nuevo Paquete</h3>
                    <p id="formSubtitle" style="margin: 5px 0 0 0; font-size: 0.9rem; color: var(--muted);">Completa los datos del paquete.</p>
                </div>

                <div id="mensaje" class="message"></div>

                <form id="paqueteForm">
                    <input type="hidden" id="paqueteId">

                    <div class="field">
                        <label for="nombre">Nombre del Paquete</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Ej. Escapada RomÃ¡ntica" required>
                    </div>

                    <div class="field">
                        <label for="descripcion">DescripciÃ³n</label>
                        <textarea id="descripcion" name="descripcion" placeholder="Detalles de lo que incluye..." style="height: 100px;"></textarea>
                    </div>

                    <div class="field-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="field">
                            <label for="precio">Precio</label>
                            <input type="number" id="precio" name="precio" min="0" placeholder="180000" required>
                        </div>
                        <div class="field">
                            <label for="estado">Estado</label>
                            <select id="estado" name="estado" required>
                                <option value="1">Disponible</option>
                                <option value="0">Agotado</option>
                            </select>
                        </div>
                    </div>

                    <div class="actions" style="margin-top: 30px; display: flex; gap: 10px;">
                        <button class="primary" type="submit" id="submitButton" style="flex: 2;">Guardar paquete</button>
                        <button class="secondary" type="button" id="btnCancelarEdicion" style="flex: 1;">Cancelar</button>
                    </div>
                </form>
            </article>
        </div>
    </main>

    <script type="module" src="../js/paquetes.js"></script>
</body>
</html>
