<!DOCTYPE html>
<html lang="es" data-auth-pending>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Dashboard | ViaLuna</title>
  <link rel="stylesheet" href="../styles/dashboard-visily.css">
  <script type="module">
    import { protectPage } from "./core/authGuard.js";
    protectPage({ requiredRole: "admin" });
  </script>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">🌙</div>
        <span class="logo-text">ViaLuna</span>
      </div>
      <button class="menu-toggle" id="menuToggle">☰</button>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Principal</div>
        <a href="#dashboard" class="nav-item active" data-view="dashboard">
          <span class="nav-icon">📊</span>
          <span class="nav-text">Dashboard</span>
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">Operación</div>
        <a href="#reservas" class="nav-item" data-view="reservas">
          <span class="nav-icon">🏨</span>
          <span class="nav-text">Reservas</span>
        </a>
        <a href="#habitaciones" class="nav-item" data-view="habitaciones">
          <span class="nav-icon">🛏️</span>
          <span class="nav-text">Habitaciones</span>
        </a>
        <a href="#paquetes" class="nav-item" data-view="paquetes">
          <span class="nav-icon">📦</span>
          <span class="nav-text">Paquetes</span>
        </a>
        <a href="#servicios" class="nav-item" data-view="servicios">
          <span class="nav-icon">🔧</span>
          <span class="nav-text">Servicios</span>
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">Gestión</div>
        <a href="#clientes" class="nav-item" data-view="clientes">
          <span class="nav-icon">👥</span>
          <span class="nav-text">Clientes</span>
        </a>
        <a href="#roles" class="nav-item" data-view="roles">
          <span class="nav-icon">👔</span>
          <span class="nav-text">Roles y Permisos</span>
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">Finanzas</div>
        <a href="#pagos" class="nav-item" data-view="pagos">
          <span class="nav-icon">💳</span>
          <span class="nav-text">Pagos</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">A</div>
        <div class="user-details">
          <div class="user-name" id="userName">Administrador</div>
          <div class="user-role">Admin</div>
        </div>
      </div>
      <button class="logout-btn" id="logoutBtn">
        <span>🚪 Cerrar sesión</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content" id="app-content">
    <!-- Content will be loaded dynamically -->
  </main>

  <script type="module">
    import { getSession } from "./core/api.js";
    import { logout } from "./core/authGuard.js";
    import { renderDashboard, navigate } from "./dashboard.js";

    // Global state
    let session = getSession();

    // DOM references
    const refs = {
      userName: document.getElementById("userName"),
      logoutBtn: document.getElementById("logoutBtn"),
      menuToggle: document.getElementById("menuToggle"),
      sidebar: document.getElementById("sidebar"),
      appContent: document.getElementById("app-content")
    };

    // Initialize app
    async function init() {
      // Setup user info and logout
      if (refs.userName) {
        refs.userName.textContent = session?.nombre || "Administrador";
      }
      
      if (refs.logoutBtn) {
        refs.logoutBtn.addEventListener("click", logout);
      }

      // Setup sidebar toggle
      if (refs.menuToggle && refs.sidebar) {
        refs.menuToggle.addEventListener('click', () => {
          refs.sidebar.classList.toggle('collapsed');
          refs.appContent.classList.toggle('expanded');
          
          if (refs.sidebar.classList.contains('collapsed')) {
            refs.menuToggle.textContent = '☰';
          } else {
            refs.menuToggle.textContent = '✕';
          }
        });
      }

      // Setup navigation
      document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', (e) => {
          e.preventDefault();
          const viewName = item.dataset.view;
          if (viewName) {
            navigate(viewName);
          }
        });
      });

      // Load initial view
      const hashView = window.location.hash.slice(1);
      const initialView = hashView || 'dashboard';
      
      // Initialize dashboard module
      renderDashboard(refs.appContent);
    }

    // Wait for DOM to be ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
